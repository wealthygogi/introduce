<meta charset="UTF-8">

<link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=Noto+Serif+KR:wght@400;700&family=Noto+Serif+JP:wght@400;700&display=swap" rel="stylesheet">

<style>
/* ── reset ── */
*{margin:0;padding:0;box-sizing:border-box;}
html{scroll-behavior:smooth;}
body{background:#060002;color:#fff;font-family:'Noto Serif KR','Noto Serif JP',serif;overflow-x:hidden;min-height:100vh;}
img{display:block;}
.px{image-rendering:pixelated;image-rendering:crisp-edges;}

/* ── top nav ── */
.top-nav{
  position:sticky;top:0;z-index:999;
  background:rgba(3,0,0,.97);border-bottom:1px solid #440000;
  padding:10px 20px;display:flex;align-items:center;gap:10px;flex-wrap:wrap;
}
.nav-back{
  font-family:'Press Start 2P',monospace;font-size:10px;color:#aa4444;
  text-decoration:none;padding:6px 12px;border:1px solid #550000;
  transition:all .2s;white-space:nowrap;
}
.nav-back:hover{color:#ff9090;border-color:#880000;background:rgba(136,0,0,.15);}
.nav-title{
  font-family:'Press Start 2P',monospace;font-size:9px;color:#ff4040;
  margin-right:auto;letter-spacing:2px;
}
.lang-btns{display:flex;gap:4px;}
.lang-btn{
  font-family:'Press Start 2P',monospace;font-size:10px;color:#662222;
  background:none;border:1px solid #330000;padding:5px 10px;cursor:pointer;
  transition:all .2s;
}
.lang-btn.active,.lang-btn:hover{color:#ff9090;border-color:#880000;background:rgba(136,0,0,.12);}

/* ── main layout ── */
.main-wrap{
  display:grid;grid-template-columns:380px 1fr;
  min-height:calc(100vh - 48px);
}
@media(max-width:820px){
  .main-wrap{grid-template-columns:1fr;}
}

/* ── LEFT: form panel ── */
.form-panel{
  background:#0a0002;border-right:1px solid #330000;
  overflow-y:auto;max-height:calc(100vh - 48px);
  position:sticky;top:48px;
  padding:20px;display:flex;flex-direction:column;gap:14px;
}
@media(max-width:820px){
  .form-panel{position:static;max-height:none;}
}

.form-section{display:flex;flex-direction:column;gap:6px;}
.form-label{
  font-family:'Noto Serif KR','Noto Serif JP','Press Start 2P',monospace;font-size:14px;color:#884040;
  letter-spacing:0;
}
.form-input{
  background:#0e0002;border:1px solid #550000;color:#ffcccc;
  padding:8px 10px;font-family:'Noto Serif KR','Noto Serif JP',serif;font-size:14px;
  outline:none;width:100%;transition:border-color .2s;
}
.form-input:focus{border-color:#880000;}
.form-input::placeholder{color:#441818;}
textarea.form-input{resize:vertical;min-height:70px;line-height:1.7;}

.form-hr{border:none;border-top:1px solid #1e0005;margin:2px 0;}

/* char picker grid */
.char-grid{
  display:grid;grid-template-columns:repeat(auto-fill,40px);
  gap:4px;
}
.char-thumb{
  width:40px;height:40px;cursor:pointer;
  border:2px solid transparent;padding:2px;
  background:#0e0002;transition:border-color .15s,background .15s;
  display:flex;align-items:center;justify-content:center;
}
.char-thumb:hover{border-color:#550000;background:#150006;}
.char-thumb.selected{border-color:#880000;background:#1a0008;box-shadow:0 0 8px rgba(136,0,0,.5);}
.char-thumb img{width:32px;height:32px;}

/* radio group */
.radio-group{display:flex;flex-wrap:wrap;gap:6px;}
.radio-opt{
  font-family:'Noto Serif KR','Noto Serif JP','Press Start 2P',monospace;font-size:14px;color:#552020;
  padding:5px 10px;border:1px solid #330000;cursor:pointer;
  transition:all .15s;user-select:none;
}
.radio-opt:hover{border-color:#660000;color:#aa5050;}
.radio-opt.selected{border-color:#880000;color:#ffaaaa;background:rgba(136,0,0,.12);}

/* checkbox chips */
.check-group{display:flex;flex-wrap:wrap;gap:5px;}
.check-chip{
  font-family:'Noto Serif KR','Noto Serif JP','Press Start 2P',monospace;font-size:14px;color:#441818;
  padding:4px 8px;border:1px solid #2a0000;cursor:pointer;
  transition:all .15s;user-select:none;
}
.check-chip:hover{border-color:#550000;color:#884444;}
.check-chip.checked{border-color:#880000;color:#ffaaaa;background:rgba(136,0,0,.15);}

/* download button */
.dl-btn{
  font-family:'Press Start 2P',monospace;font-size:10px;
  color:#ffaaaa;padding:12px 20px;
  background:linear-gradient(135deg,#5a0000,#880000);
  border:1px solid #aa2020;cursor:pointer;
  transition:all .2s;width:100%;margin-top:4px;
  text-align:center;letter-spacing:1px;
}
.dl-btn:hover{background:linear-gradient(135deg,#880000,#aa0000);border-color:#cc3030;color:#fff;}
.dl-btn:active{transform:scale(.98);}

/* ── RIGHT: preview panel ── */
.preview-panel{
  background:#060002;display:flex;align-items:flex-start;
  justify-content:center;padding:80px 24px 40px;
  overflow-y:auto;
}
@media(max-width:820px){
  .preview-panel{padding:70px 16px 30px;}
}

/* ── CARD ── */
#preview{
  width:600px;max-width:100%;
  font-family:'Noto Serif KR','Noto Serif JP',serif;
}

@keyframes float{0%,100%{transform:translateY(0)}50%{transform:translateY(-10px)}}
@keyframes float2{0%,100%{transform:translateY(0)}50%{transform:translateY(-8px)}}
@keyframes float3{0%,100%{transform:translateY(0)}50%{transform:translateY(-12px)}}
@media(max-width:600px){
  .nav-title{font-size:8px;letter-spacing:1px;}
  .nav-back{font-size:9px;padding:5px 8px;}
  .lang-btn{font-size:9px;padding:4px 7px;}
  .top-nav{padding:8px 12px;gap:6px;}
  .form-panel{padding:14px;}
  .form-label{font-size:14px;}
  .form-input{font-size:14px;}
  .radio-opt,.check-chip{font-size:14px;padding:4px 8px;}
  .dl-btn{font-size:9px;padding:10px 16px;}

}

let lang = 'ko';
let selectedChar = 'reimu';
let selectedFub = 'free';
let selectedParting = 'unfollow';
let selectedOther = 'sometimes';
const checkedSeries = new Set(['th6']);
let checkedAcct = new Set(['daily','chat','fan','rt','like']);

/* ═══════════════════════════════════════
   INIT
═══════════════════════════════════════ */
function init() {
  buildCharGrid();
  buildAcctChips();
  buildSeriesGrid('ko');
  applyI18N();
  updateCard();
}

function buildCharGrid() {
  const grid = document.getElementById('char-grid');
  grid.innerHTML = '';
  CHARS.forEach(c => {
    const div = document.createElement('div');
    div.className = 'char-thumb' + (c.id === selectedChar ? ' selected' : '');
    div.title = c[lang] || c.ko;
    div.onclick = () => selectChar(c.id);
    div.id = 'ct-' + c.id;
    const img = document.createElement('img');
    img.className = 'px';
    img.src = decodeURIComponent(c.p);
    img.alt = c.en;
    img.style.cssText = 'width:32px;height:32px;image-rendering:pixelated;image-rendering:crisp-edges;';
    div.appendChild(img);
    grid.appendChild(div);
  });
}

function buildAcctChips() {
  const grp = document.getElementById('acct-group');
  grp.innerHTML = '';
  ACCT.forEach(a => {
    const div = document.createElement('div');
    div.className = 'check-chip' + (checkedAcct.has(a.id) ? ' checked' : '');
    div.id = 'ac-' + a.id;
    div.textContent = a[lang] || a.ko;
    div.onclick = () => toggleAcct(a.id);
    grp.appendChild(div);
  });
}

function buildSeriesGrid(lang) {
  ['old','new','extra'].forEach(group => {
    const el = document.getElementById('series-'+group+'-group');
    if (!el) return;
    el.innerHTML = SERIES.filter(s=>s.group===group).map(s => {
      const label = (s.num ? 'TH'+s.num+' ' : '') + (s[lang]||s.en);
      const on = checkedSeries.has(s.id);
      return `<div class="check-chip ${on?'checked':''}" onclick="toggleSeries('${s.id}',this)">${label}</div>`;
    }).join('');
  });
}

function toggleSeries(id, el) {
  if (checkedSeries.has(id)) { checkedSeries.delete(id); el.classList.remove('checked'); }
  else { checkedSeries.add(id); el.classList.add('checked'); }
  updateCard();
}

function toggleSeriesGroup(group) {
  const inGroup = SERIES.filter(s => s.group === group);
  const allChecked = inGroup.every(s => checkedSeries.has(s.id));
  if (allChecked) {
    inGroup.forEach(s => checkedSeries.delete(s.id));
  } else {
    inGroup.forEach(s => checkedSeries.add(s.id));
  }
  buildSeriesGrid(lang);
  updateCard();
}

function setLang(l) {
  lang = l;
  document.querySelectorAll('.lang-btn').forEach((b,i)=>{
    b.classList.toggle('active', ['ko','ja','en'][i]===l);

  applyI18N();

}

function selectChar(id) {
  document.querySelectorAll('.char-thumb').forEach(el => el.classList.remove('selected'));
  const el = document.getElementById('ct-' + id);
  if (el) el.classList.add('selected');
  selectedChar = id;
  updateCard();
}

function selectFub(val) {
  document.querySelectorAll('#fub-group .radio-opt').forEach(el => el.classList.remove('selected'));
  document.getElementById('fub-' + val).classList.add('selected');
  selectedFub = val;
  updateCard();
}

function selectParting(val) {
  document.querySelectorAll('#parting-group .radio-opt').forEach(el => el.classList.remove('selected'));
  document.getElementById('parting-' + val).classList.add('selected');
  selectedParting = val;
  updateCard();
}

function selectOther(val) {
  document.querySelectorAll('#other-group .radio-opt').forEach(el => el.classList.remove('selected'));
  document.getElementById('other-' + val).classList.add('selected');
  selectedOther = val;
  updateCard();
}

function toggleAcct(id) {
  if (checkedAcct.has(id)) {
    checkedAcct.delete(id);
    document.getElementById('ac-' + id).classList.remove('checked');
  } else {
    checkedAcct.add(id);
    document.getElementById('ac-' + id).classList.add('checked');
  }
  updateCard();
}

      <div style="font-family:'Noto Serif KR','Noto Serif JP',serif;font-size:14px;color:#ddd;line-height:2;padding-left:4px;">${freeTextHtml}</div>
    </div>
    ` : ''}

  </div>

  <!-- footer -->
  <div style="
    border-top:1px solid #3a0000;
    background:rgba(8,0,0,.96);
    padding:12px 30px;
    display:flex;
    justify-content:center;
    align-items:center;
    gap:10px;
  ">
    <span style="font-family:'Press Start 2P',monospace;font-size:10px;color:#440000;letter-spacing:2px;">Touhou Project © ZUN</span>
    <span style="color:#330000;">·</span>
    <span style="font-family:'Press Start 2P',monospace;font-size:10px;color:#440000;letter-spacing:2px;">Sprites by Majstek</span>
  </div>

</div>
  `;

  document.getElementById('preview').innerHTML = html;
}

function escHtml(s) {
  return String(s)
    .replace(/&/g,'&amp;')
    .replace(/</g,'&lt;')
    .replace(/>/g,'&gt;')
    .replace(/"/g,'&quot;');
}

function updateCard() {
  renderCard();
}

/* ═══════════════════════════════════════
   DOWNLOAD
═══════════════════════════════════════ */
async function downloadCard() {
  try {
    try { await Promise.race([document.fonts.ready, new Promise(r => setTimeout(r, 2500))]); } catch(_) {}
    const el = document.getElementById('preview');
    const canvas = await html2canvas(el, {
      backgroundColor: '#060002',
      scale: 2,
      useCORS: true,
      allowTaint: true,
    });
    const a = document.createElement('a');
    a.download = 'trchinsou-spellcard.png';
    a.href = canvas.toDataURL('image/png');
    a.click();
  } catch(e) {
    alert('저장 실패 / 保存失敗 / Save failed');
  }
}

/* ═══════════════════════════════════════
   BOOT
═══════════════════════════════════════ */
init();
</script>
