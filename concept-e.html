  }
  .nav-left {

    align-items: center;
    gap: 20px;
  }
  .back-link {
    color: #606068;
    text-decoration: none;
    font-size:14px;
    font-family: 'DotGothic16', monospace;
    letter-spacing: 1px;
    transition: color 0.15s;
  }
  .back-link:hover { color: #c8c8c8; }
  .nav-title {
    font-family: 'Press Start 2P', monospace;
    font-size: 11px;
    color: #888890;
    letter-spacing: 2px;
  }
  .lang-buttons {
    display: flex;
    gap: 4px;
  }
  .lang-btn {
    background: none;
    border: 1px solid #282830;
    color: #606068;
    font-family: 'DotGothic16', monospace;
    font-size:14px;
    padding: 4px 10px;
    cursor: pointer;
    transition: all 0.15s;
  }
  .lang-btn:hover { border-color: #484850; color: #c8c8c8; }
  .lang-btn.active { border-color: #808088; color: #e0e0e0; background: #141418; }

  /* BODY */
  .main-body {
    display: flex;
    flex: 1;
    gap: 0;
    min-height: 0;
  }

  /* FORM PANEL */
  .form-panel {
    width: 380px;
    flex-shrink: 0;
    border-right: 1px solid #1e1e28;
    overflow-y: auto;
    padding: 20px 18px 32px;
    background: #07070b;
  }

  .form-section-title {
    font-family: 'Press Start 2P', monospace;
    font-size:10px;
    color: #484850;
    letter-spacing: 2px;
    text-transform: uppercase;
    padding: 14px 0 8px;
    border-bottom: 1px solid #141420;
    margin-bottom: 14px;
  }
  .form-section-title:first-child { padding-top: 0; }

  .form-row {
    margin-bottom: 12px;
  }
  .form-label {
    font-size:14px;
    font-family: 'DotGothic16', 'Noto Serif JP', monospace;
    color: #606068;
    margin-bottom: 5px;
    letter-spacing: 1px;
  }

  input[type="text"], textarea {
    width: 100%;
    background: #0c0c10;
    border: 1px solid #282830;
    color: #d0d0d8;
    font-family: 'DotGothic16', monospace;
    font-size:14px;
    padding: 7px 10px;
    outline: none;
    transition: border-color 0.15s;
    resize: vertical;
  }
  input[type="text"]:focus, textarea:focus { border-color: #484850; }
  input[type="text"]::placeholder, textarea::placeholder { color: #383840; }
  textarea { min-height: 70px; }

  /* RADIO + CHECKBOX */
  .radio-group, .checkbox-group {
    display: flex;
    flex-wrap: wrap;
    gap: 6px;
  }
  .radio-option, .checkbox-option {
    display: flex;
    align-items: center;
    gap: 5px;
    cursor: pointer;
    padding: 5px 10px;
    border: 1px solid #1e1e28;
    background: #0c0c10;
    font-size:14px;
    color: #808088;
    transition: all 0.15s;
    user-select: none;
  }
  .radio-option:hover, .checkbox-option:hover {
    border-color: #383840;
    color: #c0c0c8;
  }
  .radio-option.active, .checkbox-option.active {
    border-color: #484850;
    color: #e0e0e0;
    background: #111118;
  }
  .radio-option input, .checkbox-option input { display: none; }
  .sym { font-size:14px; margin-right: 2px; }

  /* CHAR SELECTOR */
  .char-selector-btn {
    width: 100%;
    background: #0c0c10;
    border: 1px solid #282830;
    color: #d0d0d8;
    font-family: 'DotGothic16', monospace;
    font-size:14px;
    padding: 8px 12px;
    cursor: pointer;
    text-align: left;
    display: flex;
    align-items: center;
    gap: 10px;
    transition: border-color 0.15s;
  }
  .char-selector-btn:hover { border-color: #484850; }
  .char-selector-btn img {
    width: 32px;
    height: 32px;
    image-rendering: pixelated;
  }

  /* CHAR MODAL */
  .modal-overlay {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.85);
    z-index: 100;
    align-items: center;
    justify-content: center;
  }
  .modal-overlay.open { display: flex; }
  .modal-box {
    background: #0a0a0e;
    border: 1px solid #303038;
    width: 90%;
    max-width: 600px;
    max-height: 80vh;
    display: flex;
    flex-direction: column;
    font-family: 'DotGothic16', monospace;
  }
  .modal-header {
    padding: 12px 20px;
    background: #141418;
    border-bottom: 1px solid #282830;
    display: flex;
    justify-content: space-between;
    align-items: center;
    font-size:14px;
    color: #c8c8c8;
    letter-spacing: 2px;
  }
  .modal-close {
    background: none;
    border: 1px solid #383840;
    color: #888890;
    font-family: 'DotGothic16', monospace;
    font-size:14px;
    padding: 3px 10px;
    cursor: pointer;
  }
  .modal-close:hover { color: #e0e0e0; border-color: #606068; }
  .modal-body {
    overflow-y: auto;
    padding: 16px;
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(72px, 1fr));
    gap: 8px;
  }
  .char-item {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 5px;
    padding: 8px 4px;
    border: 1px solid #1e1e28;
    background: #0c0c10;
    cursor: pointer;
    transition: all 0.12s;
  }
  .char-item:hover { border-color: #484850; background: #111118; }
  .char-item.selected { border-color: #808088; background: #141420; }
  .char-item img {
    width: 32px;
    height: 32px;
    image-rendering: pixelated;
  }
  .char-item span {
    font-size: 9px;
    color: #808088;
    text-align: center;
    line-height: 1.2;
    word-break: break-all;
  }
  .char-item.selected span { color: #c8c8c8; }

  /* PREVIEW PANEL */
  .preview-panel {
    flex: 1;
    min-width: 0;
    padding: 24px;
    overflow-y: auto;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 20px;
  }

  .download-btn {
    background: #0c0c10;
    border: 1px solid #383840;
    color: #c0c0c8;
    font-family: 'DotGothic16', monospace;
    font-size:14px;
    padding: 10px 28px;
    cursor: pointer;
    letter-spacing: 1px;
    transition: all 0.15s;
  }
  .download-btn:hover { border-color: #606068; color: #e0e0e0; background: #141418; }

  /* CARD */
  #preview {
    width: 100%;

  }

  /* MOBILE */
  @media (max-width: 700px) {

</div>

// --- Radio ---
function setRadio(group, val, el) {
  radioState[group] = val;
  const grpEl = document.getElementById(group+'-group');
  grpEl.querySelectorAll('.radio-option').forEach(opt=>{
    const on = opt.dataset.val === val;
    opt.classList.toggle('active', on);
    opt.querySelector('.sym').textContent = on ? '●' : '○';
  });
  updatePreview();
}

// --- Acct checkboxes ---
function rebuildAcctGroup() {
  const t = I18N[lang];
  const grp = document.getElementById('acct-group');
  grp.innerHTML = '';
  ACCT.forEach(a=>{
    const on = checkedAcct.has(a.id);
    const label = document.createElement('label');
    label.className = 'checkbox-option' + (on?' active':'');
    label.dataset.id = a.id;
    label.innerHTML = `<span class="sym">${on?'■':'□'}</span>${a[lang]}`;
    label.onclick = () => toggleAcct(a.id, label);
    grp.appendChild(label);
  });
}

function toggleAcct(id, el) {
  if(checkedAcct.has(id)) {
    checkedAcct.delete(id);
    el.classList.remove('active');
    el.querySelector('.sym').textContent = '□';
  } else {
    checkedAcct.add(id);
    el.classList.add('active');
    el.querySelector('.sym').textContent = '■';
  }
  updatePreview();
}

// --- Series checkboxes ---
function buildSeriesGrid(l) {
  ['old','new','extra'].forEach(group => {
    const el = document.getElementById('series-'+group+'-group');
    if (!el) return;
    el.innerHTML = SERIES.filter(s=>s.group===group).map(s => {
      const label = (s.num ? 'TH'+s.num+' ' : '') + (s[l]||s.en);
      const on = checkedSeries.has(s.id);
      return `<button type="button" onclick="toggleSeries('${s.id}',this)" style="font-family:'DotGothic16',monospace;font-size: 12px;padding:3px 8px;border:1px solid ${on?'#585840':'#282830'};background:${on?'rgba(208,192,64,.15)':'none'};color:${on?'#d0d040':'#606068'};cursor:pointer;transition:all .15s;">${label}</button>`;
    }).join('');
  });
}

function toggleSeries(id, el) {
  if (checkedSeries.has(id)) {
    checkedSeries.delete(id);
    el.style.borderColor='#282830'; el.style.background='none'; el.style.color='#606068';
  } else {
    checkedSeries.add(id);
    el.style.borderColor='#585840'; el.style.background='rgba(208,192,64,.15)'; el.style.color='#d0d040';
  }
  updatePreview();
}

function toggleSeriesGroup(group) {
  const inGroup = SERIES.filter(s => s.group === group);
  const allChecked = inGroup.every(s => checkedSeries.has(s.id));
  if (allChecked) {
    inGroup.forEach(s => checkedSeries.delete(s.id));
  } else {
    inGroup.forEach(s => checkedSeries.add(s.id));
  }
  buildSeriesGrid(lang);
  updatePreview();
}

// --- Modal ---
function buildModal() {
  const body = document.getElementById('modal-body');
  body.innerHTML = '';
  CHARS.forEach(c=>{
    const div = document.createElement('div');
    div.className = 'char-item' + (c.id===selectedChar?' selected':'');
    div.innerHTML = `<img src="${charPath(c)}" alt="${c[lang]}" onerror="this.style.opacity=0.3"><span>${c[lang]}</span>`;
    div.onclick = () => selectChar(c.id);
    body.appendChild(div);
  });
}

function openModal() {
  buildModal();
  document.getElementById('modal').classList.add('open');
}
function closeModal() {
  document.getElementById('modal').classList.remove('open');
}
function closeModalOutside(e) {
  if(e.target===document.getElementById('modal')) closeModal();
}
function selectChar(id) {
  selectedChar = id;
  const c = getChar(id);
  document.getElementById('char-btn-img').src = charPath(c);
  document.getElementById('char-btn-name').textContent = charName(c);
  // update modal selection highlight
  document.querySelectorAll('.char-item').forEach(el=>{
    // find by char name match
  });
  closeModal();
  updatePreview();
}

  const seriesChipsHtml = selectedSeries.length > 0

        const name = (s.num ? 'TH'+s.num+' ' : '') + (s[lang]||s.en);

      <div style="font-size:14px;color:#e0e0e0;flex:1;font-family:'DotGothic16',monospace;line-height:1.6">${valHtml}</div>
    </div>`;

  const SEP = (label) => `
    <div style="font-size:11px;color:#505058;padding:7px 24px;background:#0c0c10;border-bottom:1px solid #181820;letter-spacing:2px;font-family:'DotGothic16',monospace">── ${label} ──────────────────────────────────────────</div>`;

  } else {
    // first row has the key label, subsequent rows have empty key
    for(let i=0;i<acctRows.length;i++){
      const key = i===0 ? t.acctType : '';
      const val = acctRows[i].map(a=>CHECK(true,a[lang])).join('');

  const otherHtml = RADIO('none',radioState.other,t.none) + RADIO('sometimes',radioState.other,t.sometimes) + RADIO('often',radioState.other,t.often);

  // free text — preserve newlines

<div style="background:#0a0a0e;border:1px solid #303038;max-width:720px;margin:0 auto;font-family:'DotGothic16',monospace">

  <!-- Titlebar -->

  <!-- Footer -->
  <div style="border-top:1px solid #202028;padding:14px 24px;display:flex;justify-content:flex-end;gap:12px;background:#0e0e12">
    <button style="font-size:14px;color:#c8c8c8;border:1px solid #484848;padding:6px 24px;background:none;font-family:'DotGothic16',monospace;cursor:default">[ 결정 ]</button>
    <button style="font-size:14px;color:#606068;border:1px solid #303038;padding:6px 24px;background:none;font-family:'DotGothic16',monospace;cursor:default">[ 취소 ]</button>
  </div>

</div>`;

  return html;
}

function updatePreview() {
  document.getElementById('preview').innerHTML = renderCard();
}

// --- Download ---
async function downloadCard() {
  const el = document.getElementById('preview');
  const canvas = await html2canvas(el, { backgroundColor:'#060608', scale:2, useCORS:true, allowTaint:true });
  const a = document.createElement('a');
  a.download = 'trchinsou-config.png';
  a.href = canvas.toDataURL('image/png');
  a.click();
}

// --- Init ---
(function init(){
  // set char btn initial image
  const c = getChar(selectedChar);
  document.getElementById('char-btn-img').src = charPath(c);
  document.getElementById('char-btn-name').textContent = charName(c);
  rebuildAcctGroup();
  buildSeriesGrid('ko');
  applyI18N();
  updatePreview();
})();
</script>
