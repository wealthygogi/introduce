<style>
/* ── reset ── */
*{margin:0;padding:0;box-sizing:border-box;}
html,body{height:100%;overflow:hidden;}
body{background:#09080f;color:#fff;font-family:'Noto Serif JP',serif;}
img{display:block;}

/* ── top nav ── */
.top-nav{
  height:52px;
  background:rgba(4,3,12,.97);
  border-bottom:1px solid #1e1e30;
  padding:0 20px;
  display:flex;align-items:center;gap:16px;
  flex-shrink:0;
  position:relative;z-index:10;
}
.top-nav a.back{
  font-family:'Press Start 2P',monospace;font-size:10px;
  color:#8070b8;text-decoration:none;
  padding:6px 10px;border:1px solid #2a2050;
  transition:all .2s;white-space:nowrap;
}
.top-nav a.back:hover{color:#d0b8ff;border-color:#6a5acd;background:rgba(106,90,205,.1);}
.top-nav .nav-title{
  font-family:'Press Start 2P',monospace;font-size:10px;
  color:#c0a8f8;margin-right:auto;letter-spacing:1px;
}
.lang-btns{display:flex;gap:4px;}
.lang-btn{
  font-family:'Press Start 2P',monospace;font-size:10px;
  background:none;border:1px solid #2a2050;color:#5848a0;
  padding:5px 8px;cursor:pointer;transition:all .2s;
}
.lang-btn:hover,.lang-btn.active{
  color:#d8c8ff;border-color:#6a5acd;background:rgba(106,90,205,.15);
}

/* ── two-column layout ── */
.layout{
  display:flex;
  height:calc(100vh - 52px);
}

/* ── LEFT: form column ── */
.form-col{
  min-width:340px;max-width:400px;width:360px;
  background:#0e0c1a;
  border-right:1px solid #1e1840;
  padding:20px;
  overflow-y:auto;
  flex-shrink:0;
}
.form-section{margin-bottom:16px;}
.form-label{
  font-family:'Noto Serif JP','Press Start 2P',monospace;
  font-size:14px;color:#8070b8;
  display:block;margin-bottom:6px;letter-spacing:1px;
}
.form-input{
  background:#080618;border:1px solid #2a2050;color:#d8c8ff;
  padding:8px;font-family:'Noto Serif JP',serif;font-size:14px;
  width:100%;outline:none;
  transition:border-color .2s;
}
.form-input:focus{border-color:#6a5acd;}
textarea.form-input{resize:vertical;}

/* radio / checkbox labels */
.radio-group,.check-group{display:flex;flex-wrap:wrap;gap:6px 0;margin-top:2px;}
.radio-label,.check-label{
  font-family:'Noto Serif JP','Press Start 2P',monospace;font-size:14px;color:#a090d0;
  cursor:pointer;display:inline-flex;align-items:center;gap:5px;
  margin-right:12px;margin-bottom:4px;
  user-select:none;
}
.radio-label input,.check-label input{
  accent-color:#6a5acd;width:11px;height:11px;cursor:pointer;
}

/* character grid */
.char-grid{
  display:grid;grid-template-columns:repeat(auto-fill,48px);gap:4px;
  max-height:200px;overflow-y:auto;
  padding:4px;background:#060414;border:1px solid #1a1640;
}
.char-item{
  width:48px;height:48px;
  display:flex;align-items:center;justify-content:center;
  cursor:pointer;border:2px solid transparent;
  transition:border-color .1s;
}
.char-item:hover{border-color:rgba(106,90,205,.5);}
.char-item.selected{border-color:#6a5acd;background:rgba(106,90,205,.2);}
.char-item img{image-rendering:pixelated;image-rendering:crisp-edges;width:32px;height:32px;}
.char-selected-name{
  font-family:'Noto Serif JP','Press Start 2P',monospace;font-size:14px;color:#b0a0e0;
  margin-top:6px;text-align:center;min-height:18px;
}

/* download btn */
.download-btn{
  font-family:'Press Start 2P',monospace;font-size:10px;
  background:linear-gradient(90deg,#3a2870,#5a3898);color:#e8d8ff;
  border:1px solid #6a5acd;padding:10px 16px;cursor:pointer;
  width:100%;margin-top:8px;letter-spacing:1px;
  transition:filter .2s;
}
.download-btn:hover{filter:brightness(1.15);}

/* ── RIGHT: preview column ── */
.preview-col{
  flex:1;
  overflow-y:auto;
  background:#09080f;
  display:flex;align-items:flex-start;justify-content:center;
  padding:32px 24px;
}
#preview{width:100%;max-width:760px;}

/* ── mobile ── */
@media(max-width:767px){
  html,body{height:auto;overflow:auto;}
  .layout{flex-direction:column;height:auto;}
  .form-col{min-width:100%;max-width:100%;width:100%;height:auto;overflow-y:visible;}
  .preview-col{padding:20px 12px 40px;}
}
</style>

  {id:'th17',num:'17',ko:'귀형수',ja:'鬼形獣',en:'WBaWC',group:'new'},
  {id:'th18',num:'18',ko:'홍롱동',ja:'虹龍洞',en:'UM',group:'new'},
  {id:'th19',num:'19',ko:'수왕원',ja:'獣王園',en:'UDoaLG',group:'new'},
  {id:'th20',num:'20',ko:'금성경',ja:'金城鏡',en:'FW',group:'new'},
  {id:'manga',num:'',ko:'서적작',ja:'書籍作',en:'Books/Manga',group:'extra'},
  {id:'music',num:'',ko:'음악작품',ja:'音楽作品',en:'Music',group:'extra'},
  {id:'spinoff',num:'',ko:'스핀오프',ja:'スピンオフ',en:'Spin-offs',group:'extra'},
];
const ACCT=[
  {id:'daily',ko:'일상',ja:'日常',en:'Daily'},{id:'drawing',ko:'그림',ja:'絵',en:'Drawing'},
  {id:'game',ko:'게임',ja:'ゲーム',en:'Gaming'},{id:'story',ko:'썰',ja:'ネタ',en:'Story'},
  {id:'consume',ko:'소비',ja:'消費',en:'Shopping'},{id:'sub',ko:'구독',ja:'購読',en:'Following'},
  {id:'cos',ko:'코스',ja:'コスプレ',en:'Cosplay'},{id:'rt',ko:'RT',ja:'RT',en:'RT'},
  {id:'like',ko:'마음',ja:'いいね',en:'Likes'},{id:'chat',ko:'탐라대화',ja:'TL会話',en:'TL Chat'},
  {id:'fan',ko:'앓이',ja:'推し活',en:'Fangirling'},
];
const I18N={
  ko:{title:'동방 트친소',nickname:'닉네임',callMe:'호칭',bestChar:'최애 캐릭터',mainSeries:'주력 시리즈',acctType:'계정 유형',fub:'FUB',parting:'이별은',otherGenre:'타장르 언급',dislike:'불호소재 / 지뢰',pairing:'커플링',freeText:'자유서술',seriesOld:'── 구작',seriesNew:'── 신작',seriesExtra:'── 기타',free:'FREE',r4r:'R4R',unfollow:'언팔',blockunfollow:'블언블',block:'블락',none:'없음',sometimes:'가끔',often:'많음',download:'📸 이미지로 저장',back:'← 목록으로',selectChar:'캐릭터 선택',conceptTitle:'CONCEPT A: RPG 상태창',ph_nick:'닉네임을 입력하세요',ph_call:'아무렇게나 / ○○야, ○○씨 OK',ph_dis:'없음',ph_pair:'○○×○○',ph_free:'자유롭게 적어주세요'},
  ja:{title:'東方 自己紹介',nickname:'ニックネーム',callMe:'呼び方',bestChar:'推しキャラ',mainSeries:'主力シリーズ',acctType:'アカウントタイプ',fub:'FUB',parting:'別れは',otherGenre:'他ジャンル言及',dislike:'地雷・苦手',pairing:'カップリング',freeText:'自由記述',seriesOld:'── 旧作',seriesNew:'── 新作',seriesExtra:'── その他',free:'FREE',r4r:'R4R',unfollow:'アンフォロー',blockunfollow:'B解',block:'ブロック',none:'なし',sometimes:'たまに',often:'多め',download:'📸 画像として保存',back:'← 一覧へ',selectChar:'キャラを選ぶ',conceptTitle:'CONCEPT A: RPGステータス',ph_nick:'ニックネームを入力',ph_call:'なんでもOK',ph_dis:'なし',ph_pair:'○○×○○',ph_free:'自由に書いてください'},
  en:{title:'Touhou Self-Intro',nickname:'Nickname',callMe:'What to call me',bestChar:'Favorite Character',mainSeries:'Main Series',acctType:'Account Type',fub:'FUB',parting:'Parting',otherGenre:'Other Genres',dislike:'Dislikes / Triggers',pairing:'Pairings',freeText:'Free Notes',seriesOld:'── Old Works',seriesNew:'── New Works',seriesExtra:'── Extra',free:'FREE',r4r:'R4R',unfollow:'Unfollow',blockunfollow:'Block+Unblock',block:'Block',none:'None',sometimes:'Sometimes',often:'Often',download:'📸 Save as Image',back:'← Back',selectChar:'Select Character',conceptTitle:'CONCEPT A: RPG Status',ph_nick:'Enter your nickname',ph_call:'Anything is fine',ph_dis:'None',ph_pair:'CharA × CharB',ph_free:'Write freely'},
};

/* ═══════════════════════════════════
   STATE
═══════════════════════════════════ */
let lang = 'ko';
let selectedChar = 'reimu';
let checkedAcct = new Set(['daily','chat','fan','rt','like']);
let checkedSeries = new Set(['th6']);

/* ═══════════════════════════════════
   INIT CHAR GRID
═══════════════════════════════════ */
function initCharGrid() {
  const grid = document.getElementById('char-grid');
  grid.innerHTML = '';
  CHARS.forEach(c => {
    const div = document.createElement('div');
    div.className = 'char-item' + (c.id === selectedChar ? ' selected' : '');
    div.title = c[lang] || c.en;
    div.dataset.id = c.id;
    div.innerHTML = `<img src="${c.p}" alt="${c.en}" style="image-rendering:pixelated;image-rendering:crisp-edges;width:32px;height:32px;">`;
    div.addEventListener('click', () => {
      selectedChar = c.id;
      document.querySelectorAll('.char-item').forEach(el => el.classList.remove('selected'));
      div.classList.add('selected');
      updateCharName();
      update();
    });
    grid.appendChild(div);
  });
  updateCharName();
}

function updateCharName() {
  const c = CHARS.find(x => x.id === selectedChar);
  const el = document.getElementById('char-selected-name');
  if (c) el.textContent = '◆ ' + c[lang] + ' ◆';
}

/* ═══════════════════════════════════
   INIT ACCT CHECKBOXES
═══════════════════════════════════ */
function initAcctChecks() {
  const container = document.getElementById('acct-checks');
  container.innerHTML = '';
  ACCT.forEach(a => {
    const label = document.createElement('label');
    label.className = 'check-label';
    const cb = document.createElement('input');
    cb.type = 'checkbox';
    cb.value = a.id;
    cb.checked = checkedAcct.has(a.id);
    cb.addEventListener('change', () => {
      if (cb.checked) checkedAcct.add(a.id);
      else checkedAcct.delete(a.id);
      update();
    });
    const span = document.createElement('span');
    span.textContent = a[lang] || a.en;
    span.dataset.acctId = a.id;
    label.appendChild(cb);
    label.appendChild(span);
    container.appendChild(label);
  });
}

/* ═══════════════════════════════════
   SERIES CHECKBOXES
═══════════════════════════════════ */
function buildSeriesGrid(lang) {
  ['old','new','extra'].forEach(group => {
    const el = document.getElementById('series-'+group+'-group');
    if (!el) return;
    el.innerHTML = SERIES.filter(s=>s.group===group).map(s => {
      const label = (s.num ? 'TH'+s.num+' ' : '') + (s[lang]||s.en);
      const on = checkedSeries.has(s.id);
      return `<label class="check-label"><input type="checkbox" ${on?'checked':''} onchange="toggleSeries('${s.id}',this.checked)"> <span>${label}</span></label>`;
    }).join('');
  });
}

function toggleSeries(id, on) {
  if (on) checkedSeries.add(id); else checkedSeries.delete(id);
  update();
}

function toggleSeriesGroup(group) {
  const inGroup = SERIES.filter(s => s.group === group);
  const allChecked = inGroup.every(s => checkedSeries.has(s.id));
  if (allChecked) {
    inGroup.forEach(s => checkedSeries.delete(s.id));
  } else {
    inGroup.forEach(s => checkedSeries.add(s.id));
  }
  buildSeriesGrid(lang);
  update();
}

/* ═══════════════════════════════════
   HELPERS
═══════════════════════════════════ */
function getRadio(name) {
  const el = document.querySelector(`input[name="${name}"]:checked`);
  return el ? el.value : '';
}
function esc(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}
function nlToBr(s) {
  return esc(s).replace(/\n/g,'<br>');
}

/* ═══════════════════════════════════
   COLLECT FORM DATA
═══════════════════════════════════ */
function collectData() {
  const t = I18N[lang];
  const char = CHARS.find(c => c.id === selectedChar) || CHARS[0];
  const fub = getRadio('fub');
  const parting = getRadio('parting');
  const other = getRadio('other');
  const selectedSeries = SERIES.filter(s => checkedSeries.has(s.id));
  return {
    nick: document.getElementById('f-nick').value.trim() || t.ph_nick,
    call: document.getElementById('f-call').value.trim() || t.ph_call,
    char,
    selectedSeries,
    fubLabel: t[fub === 'free' ? 'free' : 'r4r'],
    partingLabel: t[parting === 'unfollow' ? 'unfollow' : parting === 'blockunfollow' ? 'blockunfollow' : 'block'],
    otherLabel: t[other === 'none' ? 'none' : other === 'sometimes' ? 'sometimes' : 'often'],
    dis: document.getElementById('f-dis').value.trim() || t.ph_dis,
    pair: document.getElementById('f-pair').value.trim() || t.ph_pair,
    free: document.getElementById('f-free').value.trim() || t.ph_free,
    checkedAcct,
    t,
  };
}

/* ═══════════════════════════════════
   RENDER CARD
═══════════════════════════════════ */

    </div>

    <!-- BODY -->

      <!-- SPRITE COL -->
      <div style="display:flex;flex-direction:column;align-items:center;gap:10px;">
        <div style="

          border:2px solid #6a5acd;
          background:linear-gradient(135deg,#0e0830,#1c1248);
          display:flex;align-items:center;justify-content:center;
          position:relative;overflow:hidden;
          box-shadow:0 0 18px rgba(106,90,205,0.3);
        ">
          <img src="${char.p}" alt="${esc(charName)}" style="
            width:96px;height:96px;
            image-rendering:pixelated;image-rendering:crisp-edges;
          ">
        </div>
        <div style="font-family:'Press Start 2P',monospace;font-size:10px;color:#6848a8;text-align:center;line-height:2.2;">
          ${esc(charName)}<br>◆ ${esc(t.bestChar)} ◆
        </div>
      </div>

      <!-- INFO COL -->
      <div style="display:flex;flex-direction:column;gap:12px;">

        <!-- NAME + CALL -->
        <div>
          <div style="font-family:'Press Start 2P',monospace;font-size:14px;color:#e8d8ff;letter-spacing:1px;">${esc(nick)}</div>

        </div>

        <hr style="border:none;border-top:1px solid #1a1640;">

        <!-- BEST CHAR + SERIES -->
        <div style="display:flex;align-items:center;gap:10px;">
          <img src="${char.p}" alt="" style="width:32px;height:32px;image-rendering:pixelated;image-rendering:crisp-edges;flex-shrink:0;">
          <div>
            <div style="font-family:'Press Start 2P',monospace;font-size:14px;color:#d0b8ff;">${esc(charName)}</div>
            <div style="font-family:'Press Start 2P',monospace;font-size:12px;color:#7858b8;margin-top:4px;">${esc(t.mainSeries)}</div>
            <div style="display:flex;flex-wrap:wrap;margin-top:4px;">${seriesChips}</div>

        <hr style="border:none;border-top:1px solid #1a1640;">

/* ═══════════════════════════════════
   UPDATE
═══════════════════════════════════ */
function update() {
  const data = collectData();
  document.getElementById('preview').innerHTML = renderCard(data, lang);
}

/* ═══════════════════════════════════
   LANGUAGE SWITCHER
═══════════════════════════════════ */
function setLang(l) {
  lang = l;

  // Update lang buttons
  document.querySelectorAll('.lang-btn').forEach((btn, i) => {
    btn.classList.toggle('active', ['ko','ja','en'][i] === l);
  });

  const t = I18N[l];

  // Update all [data-i18n] elements
  document.querySelectorAll('[data-i18n]').forEach(el => {
    const key = el.dataset.i18n;
    if (t[key] !== undefined) el.textContent = t[key];
  });

  // Update placeholders
  document.querySelectorAll('[data-ph]').forEach(el => {
    const key = el.dataset.ph;
    if (t[key] !== undefined) el.placeholder = t[key];
  });

  // Re-render acct checkbox labels
  document.querySelectorAll('[data-acct-id]').forEach(span => {
    const a = ACCT.find(x => x.id === span.dataset.acctId);
    if (a) span.textContent = a[l] || a.en;
  });

  // Update char grid titles and selected name
  document.querySelectorAll('.char-item').forEach(div => {
    const c = CHARS.find(x => x.id === div.dataset.id);
    if (c) div.title = c[l] || c.en;
  });
  updateCharName();

  // Re-render series checkboxes for new language
  buildSeriesGrid(l);

  // Re-render radio span labels
  document.querySelectorAll('input[name="fub"]').forEach(r => {
    const span = r.nextElementSibling;
    if (span) {
      const map = {free:'free',r4r:'r4r'};
      span.textContent = t[map[r.value]] || r.value;
    }
  });
  document.querySelectorAll('input[name="parting"]').forEach(r => {
    const span = r.nextElementSibling;
    if (span) {
      const map = {unfollow:'unfollow',blockunfollow:'blockunfollow',block:'block'};
      span.textContent = t[map[r.value]] || r.value;
    }
  });
  document.querySelectorAll('input[name="other"]').forEach(r => {
    const span = r.nextElementSibling;
    if (span) {
      const map = {none:'none',sometimes:'sometimes',often:'often'};
      span.textContent = t[map[r.value]] || r.value;
    }
  });

  update();
}

/* ═══════════════════════════════════
   DOWNLOAD
═══════════════════════════════════ */
async function downloadCard() {
  const el = document.getElementById('preview');
  try {
    if (document.fonts && document.fonts.ready) await document.fonts.ready;
    const canvas = await html2canvas(el, {
      backgroundColor: '#09080f',
      scale: 2,
      useCORS: true,
      allowTaint: true,
    });
    const a = document.createElement('a');
    a.download = 'trchinsou-rpg.png';
    a.href = canvas.toDataURL('image/png');
    a.click();
  } catch (e) {
    const msg = lang === 'ko' ? '저장 실패' : lang === 'ja' ? '保存失敗' : 'Save failed';
    alert(msg);
  }
}

/* ═══════════════════════════════════
   BOOT
═══════════════════════════════════ */
initCharGrid();
initAcctChecks();
buildSeriesGrid('ko');
update();
</script>
