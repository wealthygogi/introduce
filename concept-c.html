<html lang="ko">
<head>
<meta charset="UTF-8">

<title>CONCEPT C: 타이틀화면 — 동방 트친소</title>

<style>
/* ── reset ── */
*{margin:0;padding:0;box-sizing:border-box;}
html{scroll-behavior:smooth;}
body{background:#000a18;color:#fff;font-family:'Noto Serif JP',serif;overflow-x:hidden;min-height:100vh;}
img{display:block;}
.px{image-rendering:pixelated;image-rendering:crisp-edges;}

/* ── top nav ── */
.top-nav{
  position:sticky;top:0;z-index:999;
  background:rgba(0,8,20,.97);border-bottom:1px solid #0a2040;
  padding:10px 20px;display:flex;align-items:center;gap:10px;flex-wrap:wrap;
}
.nav-back{
  font-family:'Press Start 2P',monospace;font-size:7px;color:#3a7acc;
  text-decoration:none;padding:6px 12px;border:1px solid #0a2040;
  transition:all .2s;white-space:nowrap;
}
.nav-back:hover{color:#7ab4ff;border-color:#2a5a9a;background:rgba(42,90,154,.15);}
.nav-title{
  font-family:'Press Start 2P',monospace;font-size:8px;color:#4a90ee;
  margin-right:auto;letter-spacing:2px;
}
.lang-btns{display:flex;gap:4px;}
.lang-btn{
  font-family:'Press Start 2P',monospace;font-size:6px;color:#1a4a70;
  background:none;border:1px solid #0a2040;padding:5px 10px;cursor:pointer;
  transition:all .2s;
}
.lang-btn.active,.lang-btn:hover{color:#7ab4ff;border-color:#2a5a9a;background:rgba(42,90,154,.12);}

/* ── main layout ── */
.main-wrap{
  display:grid;grid-template-columns:380px 1fr;
  min-height:calc(100vh - 48px);
}
@media(max-width:820px){
  .main-wrap{grid-template-columns:1fr;}
}

/* ── LEFT: form panel ── */
.form-panel{
  background:#000d1f;border-right:1px solid #0a2040;
  overflow-y:auto;max-height:calc(100vh - 48px);
  position:sticky;top:48px;
  padding:20px;display:flex;flex-direction:column;gap:14px;
}
@media(max-width:820px){
  .form-panel{position:static;max-height:none;}
}

.form-section{display:flex;flex-direction:column;gap:6px;}
.form-label{
  font-family:'Press Start 2P',monospace;font-size:6px;color:#3a7acc;
  letter-spacing:1px;
}
.form-input{
  background:#000d1f;border:1px solid #0a2040;color:#c8deff;
  padding:8px 10px;font-family:'Noto Serif JP',serif;font-size:13px;
  outline:none;width:100%;transition:border-color .2s;
}
.form-input:focus{border-color:#2a5a9a;}
.form-input::placeholder{color:#122040;}
textarea.form-input{resize:vertical;min-height:70px;line-height:1.7;}

.form-hr{border:none;border-top:1px solid #071828;margin:2px 0;}

/* char picker grid */
.char-grid{
  display:grid;grid-template-columns:repeat(auto-fill,40px);
  gap:4px;
}
.char-thumb{
  width:40px;height:40px;cursor:pointer;
  border:2px solid transparent;padding:2px;
  background:#000d1f;transition:border-color .15s,background .15s;
  display:flex;align-items:center;justify-content:center;
}
.char-thumb:hover{border-color:#0a2a50;background:#011525;}
.char-thumb.selected{border-color:#2a5a9a;background:#051a35;box-shadow:0 0 8px rgba(42,90,154,.5);}
.char-thumb img{width:32px;height:32px;}

/* radio group */
.radio-group{display:flex;flex-wrap:wrap;gap:6px;}
.radio-opt{
  font-family:'Press Start 2P',monospace;font-size:6px;color:#1a3a60;
  padding:5px 10px;border:1px solid #0a2040;cursor:pointer;
  transition:all .15s;user-select:none;
}
.radio-opt:hover{border-color:#1a4070;color:#3a70b0;}
.radio-opt.selected{border-color:#2a5a9a;color:#7ab4ff;background:rgba(42,90,154,.12);}

/* checkbox chips */
.check-group{display:flex;flex-wrap:wrap;gap:5px;}
.check-chip{
  font-family:'Press Start 2P',monospace;font-size:5.5px;color:#122040;
  padding:4px 8px;border:1px solid #071828;cursor:pointer;
  transition:all .15s;user-select:none;
}
.check-chip:hover{border-color:#0a2a50;color:#2a5a80;}
.check-chip.checked{border-color:#2a5a9a;color:#7ab4ff;background:rgba(42,90,154,.15);}

/* download button */
.dl-btn{
  font-family:'Press Start 2P',monospace;font-size:7px;
  color:#7ab4ff;padding:12px 20px;
  background:linear-gradient(135deg,#051a35,#0a3060);
  border:1px solid #2a5a9a;cursor:pointer;
  transition:all .2s;width:100%;margin-top:4px;
  text-align:center;letter-spacing:1px;
}
.dl-btn:hover{background:linear-gradient(135deg,#0a3060,#104080);border-color:#4a7acc;color:#c8deff;}
.dl-btn:active{transform:scale(.98);}

/* ── RIGHT: preview panel ── */
.preview-panel{
  background:#000a18;display:flex;align-items:flex-start;
  justify-content:center;padding:30px 24px;
  overflow-y:auto;
}
@media(max-width:820px){
  .preview-panel{padding:20px 16px;}
}

/* ── CARD ── */
#preview{
  width:620px;max-width:100%;
  font-family:'Noto Serif JP',serif;
}
</style>

    <div class="form-section">

    </div>

    <hr class="form-hr">

    <!-- mainSeries -->
    <div class="form-section">

        <div class="radio-opt selected" data-val="new" onclick="selectSeries('new')" id="series-new">신작</div>
        <div class="radio-opt" data-val="both" onclick="selectSeries('both')" id="series-both">양쪽</div>
      </div>
    </div>

    <hr class="form-hr">

    <!-- acctType -->
    <div class="form-section">
      <label class="form-label" id="lbl-accttype">계정 유형</label>
      <div class="check-group" id="acct-group"></div>
    </div>

    <hr class="form-hr">

    <!-- fub -->
    <div class="form-section">
      <label class="form-label" id="lbl-fub">FUB</label>
      <div class="radio-group" id="fub-group">
        <div class="radio-opt selected" data-val="free" onclick="selectFub('free')" id="fub-free">FREE</div>
        <div class="radio-opt" data-val="r4r" onclick="selectFub('r4r')" id="fub-r4r">R4R</div>
      </div>
    </div>

    <!-- parting -->
    <div class="form-section">
      <label class="form-label" id="lbl-parting">이별은</label>
      <div class="radio-group" id="parting-group">
        <div class="radio-opt selected" data-val="unfollow" onclick="selectParting('unfollow')" id="parting-unfollow">언팔</div>
        <div class="radio-opt" data-val="blockunfollow" onclick="selectParting('blockunfollow')" id="parting-blockunfollow">블언블</div>
        <div class="radio-opt" data-val="block" onclick="selectParting('block')" id="parting-block">블락</div>
      </div>
    </div>

    <!-- otherGenre -->
    <div class="form-section">
      <label class="form-label" id="lbl-othergenre">타장르 언급</label>
      <div class="radio-group" id="other-group">
        <div class="radio-opt" data-val="none" onclick="selectOther('none')" id="other-none">없음</div>
        <div class="radio-opt selected" data-val="sometimes" onclick="selectOther('sometimes')" id="other-sometimes">가끔</div>
        <div class="radio-opt" data-val="often" onclick="selectOther('often')" id="other-often">많음</div>
      </div>
    </div>

    <hr class="form-hr">

    <!-- dislike -->
    <div class="form-section">
      <label class="form-label" id="lbl-dislike">불호소재 / 지뢰</label>
      <input class="form-input" id="inp-dislike" type="text" placeholder="없음" oninput="updateCard()">
    </div>

    <!-- pairing -->
    <div class="form-section">
      <label class="form-label" id="lbl-pairing">커플링</label>
      <input class="form-input" id="inp-pairing" type="text" placeholder="○○×○○" oninput="updateCard()">
    </div>

    <!-- freeText -->
    <div class="form-section">
      <label class="form-label" id="lbl-freetext">자유서술</label>
      <textarea class="form-input" id="inp-freetext" placeholder="자유롭게 적어주세요" oninput="updateCard()"></textarea>
    </div>

    <!-- download -->
    <button class="dl-btn" id="dl-btn" onclick="downloadCard()">&#128248; 이미지로 저장</button>

  </div>

  <!-- RIGHT: PREVIEW -->
  <div class="preview-panel">
    <div id="preview"></div>
  </div>

</div>

  ja:{title:'東方 自己紹介',nickname:'ニックネーム',callMe:'呼び方',bestChar:'推しキャラ',mainSeries:'主力シリーズ',acctType:'アカウントタイプ',fub:'FUB',parting:'別れは',otherGenre:'他ジャンル言及',dislike:'地雷・苦手',pairing:'カップリング',freeText:'自由記述',oldWorks:'旧作',newWorks:'新作',both:'両方',free:'FREE',r4r:'R4R',unfollow:'アンフォロー',blockunfollow:'B解',block:'ブロック',none:'なし',sometimes:'たまに',often:'多め',download:'📸 画像として保存',back:'← 一覧へ',selectChar:'キャラを選ぶ',ph_nick:'ニックネームを入力',ph_call:'なんでもOK',ph_dis:'なし',ph_pair:'○○×○○',ph_free:'自由に書いてください'},
  en:{title:'Touhou Self-Intro',nickname:'Nickname',callMe:'What to call me',bestChar:'Favorite Character',mainSeries:'Main Series',acctType:'Account Type',fub:'FUB',parting:'Parting',otherGenre:'Other Genres',dislike:'Dislikes / Triggers',pairing:'Pairings',freeText:'Free Notes',oldWorks:'Old Works',newWorks:'New Works',both:'Both',free:'FREE',r4r:'R4R',unfollow:'Unfollow',blockunfollow:'Block+Unblock',block:'Block',none:'None',sometimes:'Sometimes',often:'Often',download:'📸 Save as Image',back:'← Back',selectChar:'Select Character',ph_nick:'Enter your nickname',ph_call:'Anything is fine',ph_dis:'None',ph_pair:'CharA × CharB',ph_free:'Write freely'},
};

/* ═══════════════════════════════════════
   STARS — generated once, deterministic
═══════════════════════════════════════ */
const STARS = Array.from({length:60}, (_,i) => ({
  x: (i*137.5)%100,
  y: (i*97.3)%100,
  s: 0.5 + (i%3)*0.6,
  o: 0.05 + (i%5)*0.06,
}));

/* ═══════════════════════════════════════
   STATE
═══════════════════════════════════════ */
let lang = 'ko';
let selectedChar = 'reimu';
let selectedSeries = 'new';
let selectedFub = 'free';
let selectedParting = 'unfollow';
let selectedOther = 'sometimes';
let checkedAcct = new Set(['daily','chat','fan','rt','like']);

/* ═══════════════════════════════════════
   INIT
═══════════════════════════════════════ */
function init() {
  buildCharGrid();
  buildAcctChips();
  applyI18N();
  updateCard();
}

function buildCharGrid() {
  const grid = document.getElementById('char-grid');
  grid.innerHTML = '';
  CHARS.forEach(c => {
    const div = document.createElement('div');
    div.className = 'char-thumb' + (c.id === selectedChar ? ' selected' : '');
    div.title = c[lang] || c.ko;
    div.onclick = () => selectChar(c.id);
    div.id = 'ct-' + c.id;
    const img = document.createElement('img');
    img.className = 'px';
    img.src = decodeURIComponent(c.p);
    img.alt = c.en;
    img.style.cssText = 'width:32px;height:32px;image-rendering:pixelated;image-rendering:crisp-edges;';
    div.appendChild(img);
    grid.appendChild(div);
  });
}

function buildAcctChips() {
  const grp = document.getElementById('acct-group');
  grp.innerHTML = '';
  ACCT.forEach(a => {
    const div = document.createElement('div');
    div.className = 'check-chip' + (checkedAcct.has(a.id) ? ' checked' : '');
    div.id = 'ac-' + a.id;
    div.textContent = a[lang] || a.ko;
    div.onclick = () => toggleAcct(a.id);
    grp.appendChild(div);
  });
}

/* ═══════════════════════════════════════
   CONTROLS
═══════════════════════════════════════ */
function setLang(l) {
  lang = l;
  document.querySelectorAll('.lang-btn').forEach(b => b.classList.remove('active'));
  event.target.classList.add('active');
  applyI18N();
  buildCharGrid();
  buildAcctChips();
  updateCard();
}

function applyI18N() {
  const t = I18N[lang];
  document.getElementById('nav-back').textContent = t.back;
  document.getElementById('lbl-nickname').textContent = t.nickname;
  document.getElementById('lbl-callme').textContent = t.callMe;
  document.getElementById('lbl-bestchar').textContent = t.bestChar;
  document.getElementById('lbl-mainseries').textContent = t.mainSeries;
  document.getElementById('lbl-accttype').textContent = t.acctType;
  document.getElementById('lbl-fub').textContent = t.fub;
  document.getElementById('lbl-parting').textContent = t.parting;
  document.getElementById('lbl-othergenre').textContent = t.otherGenre;
  document.getElementById('lbl-dislike').textContent = t.dislike;
  document.getElementById('lbl-pairing').textContent = t.pairing;
  document.getElementById('lbl-freetext').textContent = t.freeText;
  document.getElementById('inp-nickname').placeholder = t.ph_nick;
  document.getElementById('inp-callme').placeholder = t.ph_call;
  document.getElementById('inp-dislike').placeholder = t.ph_dis;
  document.getElementById('inp-pairing').placeholder = t.ph_pair;
  document.getElementById('inp-freetext').placeholder = t.ph_free;
  document.getElementById('dl-btn').textContent = t.download;
  document.getElementById('series-old').textContent = t.oldWorks;
  document.getElementById('series-new').textContent = t.newWorks;
  document.getElementById('series-both').textContent = t.both;
  document.getElementById('fub-free').textContent = t.free;
  document.getElementById('fub-r4r').textContent = t.r4r;
  document.getElementById('parting-unfollow').textContent = t.unfollow;
  document.getElementById('parting-blockunfollow').textContent = t.blockunfollow;
  document.getElementById('parting-block').textContent = t.block;
  document.getElementById('other-none').textContent = t.none;
  document.getElementById('other-sometimes').textContent = t.sometimes;
  document.getElementById('other-often').textContent = t.often;
}

function selectChar(id) {
  document.querySelectorAll('.char-thumb').forEach(el => el.classList.remove('selected'));
  const el = document.getElementById('ct-' + id);
  if (el) el.classList.add('selected');
  selectedChar = id;
  updateCard();
}

function selectSeries(val) {
  document.querySelectorAll('#series-group .radio-opt').forEach(el => el.classList.remove('selected'));
  document.getElementById('series-' + val).classList.add('selected');
  selectedSeries = val;
  updateCard();
}

function selectFub(val) {
  document.querySelectorAll('#fub-group .radio-opt').forEach(el => el.classList.remove('selected'));
  document.getElementById('fub-' + val).classList.add('selected');
  selectedFub = val;
  updateCard();
}

function selectParting(val) {
  document.querySelectorAll('#parting-group .radio-opt').forEach(el => el.classList.remove('selected'));
  document.getElementById('parting-' + val).classList.add('selected');
  selectedParting = val;
  updateCard();
}

function selectOther(val) {
  document.querySelectorAll('#other-group .radio-opt').forEach(el => el.classList.remove('selected'));
  document.getElementById('other-' + val).classList.add('selected');
  selectedOther = val;
  updateCard();
}

function toggleAcct(id) {
  if (checkedAcct.has(id)) {
    checkedAcct.delete(id);
    document.getElementById('ac-' + id).classList.remove('checked');
  } else {
    checkedAcct.add(id);
    document.getElementById('ac-' + id).classList.add('checked');
  }
  updateCard();
}

/* ═══════════════════════════════════════
   HELPERS
═══════════════════════════════════════ */
function getCharData(id) {
  return CHARS.find(c => c.id === id) || CHARS[0];
}

function escHtml(s) {
  return String(s)
    .replace(/&/g,'&amp;')
    .replace(/</g,'&lt;')
    .replace(/>/g,'&gt;')
    .replace(/"/g,'&quot;');
}

/* ═══════════════════════════════════════
   CARD RENDER
═══════════════════════════════════════ */
function renderCard() {
  const t = I18N[lang];
  const char = getCharData(selectedChar);
  const charName = char[lang] || char.ko;
  const charSrc = decodeURIComponent(char.p);

  // Floater sprites: marisa left, selected center, cirno right
  const marisaSrc = decodeURIComponent(getCharData('marisa').p);
  const cirnoSrc = decodeURIComponent(getCharData('cirno').p);

  const nickname = document.getElementById('inp-nickname').value || t.ph_nick;
  const callMe = document.getElementById('inp-callme').value || t.ph_call;
  const dislike = document.getElementById('inp-dislike').value || t.ph_dis;
  const pairing = document.getElementById('inp-pairing').value || t.ph_pair;
  const freeText = document.getElementById('inp-freetext').value || '';

  const seriesLabel = {old:t.oldWorks,new:t.newWorks,both:t.both}[selectedSeries];
  const fubLabel = {free:t.free,r4r:t.r4r}[selectedFub];
  const partingLabel = {unfollow:t.unfollow,blockunfollow:t.blockunfollow,block:t.block}[selectedParting];
  const otherLabel = {none:t.none,sometimes:t.sometimes,often:t.often}[selectedOther];

  // Star divs
  const starsHtml = STARS.map(s =>
    `<div style="position:absolute;left:${s.x}%;top:${s.y}%;width:${s.s}px;height:${s.s}px;background:#fff;border-radius:50%;opacity:${s.o};pointer-events:none;"></div>`
  ).join('');

  // Acct chips
  const acctChipsHtml = ACCT.map(a => {
    const on = checkedAcct.has(a.id);
    const label = a[lang] || a.ko;
    return `<span style="
      font-family:'Press Start 2P',monospace;
      font-size:5.5px;
      color:${on?'#c8deff':'#0e2a48'};
      padding:4px 8px;
      border:1px solid ${on?'#1a3a5a':'#071828'};
      background:${on?'rgba(42,90,154,.18)':'rgba(0,10,30,.3)'};
      display:inline-block;
      margin:2px;
    ">${on?'&#9632;':'&#9633;'} ${escHtml(label)}</span>`;
  }).join('');

  // Free text html
  const freeTextHtml = freeText ? freeText.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/\n/g,'<br>') : '';

  const eyebrow = lang === 'ko' ? '東方Project トウィッター 自己紹介' : lang === 'ja' ? '東方Project Twitter 自己紹介' : 'Touhou Project Twitter Self-Intro';

  const html = `
<div style="background:#000814;padding:40px 30px;min-height:500px;position:relative;overflow:hidden;display:flex;flex-direction:column;align-items:center;font-family:'Noto Serif JP',serif;">

  <!-- Stars -->
  ${starsHtml}

  <!-- Eyebrow -->
  <div style="position:relative;font-family:'Press Start 2P',monospace;font-size:7px;color:#2a7aee;letter-spacing:5px;margin-bottom:14px;opacity:0.8;text-align:center;">
    ${escHtml(eyebrow)}
  </div>

  <!-- Nickname title -->
  <div style="position:relative;font-family:'Noto Serif JP',serif;font-size:48px;font-weight:700;color:#fff;letter-spacing:10px;text-shadow:0 0 30px rgba(70,140,255,.6),0 0 80px rgba(70,140,255,.18);margin-bottom:6px;text-align:center;">
    ${escHtml(nickname)}
  </div>

  <!-- Call me subtitle -->
  <div style="position:relative;font-family:'Press Start 2P',monospace;font-size:8px;color:#4a90d0;letter-spacing:3px;margin-bottom:36px;text-align:center;">
    ${escHtml(callMe)}
  </div>

  <!-- Floating sprites row -->
  <div style="position:relative;display:flex;justify-content:center;align-items:flex-end;gap:20px;margin-bottom:40px;">
    <img src="${marisaSrc}" alt="marisa" style="width:72px;height:72px;image-rendering:pixelated;image-rendering:crisp-edges;filter:drop-shadow(0 0 10px rgba(70,140,255,.55));">
    <img src="${charSrc}" alt="${escHtml(charName)}" style="width:96px;height:96px;image-rendering:pixelated;image-rendering:crisp-edges;filter:drop-shadow(0 0 14px rgba(70,140,255,.7));">
    <img src="${cirnoSrc}" alt="cirno" style="width:72px;height:72px;image-rendering:pixelated;image-rendering:crisp-edges;filter:drop-shadow(0 0 10px rgba(70,140,255,.55));">
  </div>

  <!-- Info grid -->
  <div style="position:relative;display:grid;grid-template-columns:1fr 1fr;gap:12px;width:100%;max-width:560px;margin-bottom:28px;">

    <!-- Best char (full width) -->
    <div style="grid-column:1/-1;border:1px solid #1a3a5a;background:rgba(0,20,50,.5);padding:14px 16px;display:flex;align-items:center;gap:14px;">
      <img src="${charSrc}" alt="${escHtml(charName)}" style="width:36px;height:36px;image-rendering:pixelated;image-rendering:crisp-edges;filter:drop-shadow(0 0 6px rgba(70,140,255,.5));flex-shrink:0;">
      <div>
        <div style="font-family:'Press Start 2P',monospace;font-size:5.5px;color:#3a7acc;letter-spacing:2px;margin-bottom:8px;">${escHtml(t.bestChar)}</div>
        <div style="font-family:'Noto Serif JP',serif;font-size:14px;color:#c8deff;font-weight:700;">${escHtml(charName)}</div>
      </div>
    </div>

    <!-- Main series -->
    <div style="border:1px solid #1a3a5a;background:rgba(0,20,50,.5);padding:14px 16px;">
      <div style="font-family:'Press Start 2P',monospace;font-size:5.5px;color:#3a7acc;letter-spacing:2px;margin-bottom:8px;">${escHtml(t.mainSeries)}</div>
      <div style="font-family:'Noto Serif JP',serif;font-size:13px;color:#c8deff;">${escHtml(seriesLabel)}</div>
    </div>

    <!-- FUB / Parting / Other -->
    <div style="border:1px solid #1a3a5a;background:rgba(0,20,50,.5);padding:14px 16px;">
      <div style="font-family:'Press Start 2P',monospace;font-size:5.5px;color:#3a7acc;letter-spacing:2px;margin-bottom:8px;">${escHtml(t.fub)} / ${escHtml(t.parting)} / ${escHtml(t.otherGenre)}</div>
      <div style="font-family:'Noto Serif JP',serif;font-size:12px;color:#c8deff;line-height:1.8;">
        ${escHtml(fubLabel)} &nbsp;·&nbsp; ${escHtml(partingLabel)} &nbsp;·&nbsp; ${escHtml(otherLabel)}
      </div>
    </div>

    <!-- Acct type (full width) -->
    <div style="grid-column:1/-1;border:1px solid #1a3a5a;background:rgba(0,20,50,.5);padding:14px 16px;">
      <div style="font-family:'Press Start 2P',monospace;font-size:5.5px;color:#3a7acc;letter-spacing:2px;margin-bottom:8px;">${escHtml(t.acctType)}</div>
      <div style="display:flex;flex-wrap:wrap;">${acctChipsHtml}</div>
    </div>

    <!-- Dislike -->
    <div style="border:1px solid #1a3a5a;background:rgba(0,20,50,.5);padding:14px 16px;">
      <div style="font-family:'Press Start 2P',monospace;font-size:5.5px;color:#3a7acc;letter-spacing:2px;margin-bottom:8px;">${escHtml(t.dislike)}</div>
      <div style="font-family:'Noto Serif JP',serif;font-size:12px;color:#c8deff;line-height:1.7;">${escHtml(dislike)}</div>
    </div>

    <!-- Pairing -->
    <div style="border:1px solid #1a3a5a;background:rgba(0,20,50,.5);padding:14px 16px;">
      <div style="font-family:'Press Start 2P',monospace;font-size:5.5px;color:#3a7acc;letter-spacing:2px;margin-bottom:8px;">${escHtml(t.pairing)}</div>
      <div style="font-family:'Noto Serif JP',serif;font-size:12px;color:#c8deff;line-height:1.7;">${escHtml(pairing)}</div>
    </div>

  </div>

  <!-- Free text -->
  ${freeText ? `
  <div style="position:relative;font-family:'Noto Serif JP',serif;font-size:13px;color:#c8deff;line-height:1.9;max-width:560px;text-align:center;margin-bottom:16px;">
    ${freeTextHtml}
  </div>
  ` : ''}

  <!-- Blink text -->
  <div style="position:relative;font-family:'Press Start 2P',monospace;font-size:6px;color:#182840;letter-spacing:3px;text-align:center;">
    — SCROLL TO EXPLORE —
  </div>

  <!-- Footer credit -->
  <div style="position:relative;margin-top:18px;font-family:'Press Start 2P',monospace;font-size:5px;color:#0d1e32;letter-spacing:1px;text-align:center;">
    Touhou Project © ZUN &nbsp;·&nbsp; Sprites © Touhou 16×16 Mini Pack
  </div>

</div>
  `;

  document.getElementById('preview').innerHTML = html;
}

function updateCard() {
  renderCard();
}

/* ═══════════════════════════════════════
   DOWNLOAD
═══════════════════════════════════════ */
async function downloadCard() {
  const el = document.getElementById('preview');
  const canvas = await html2canvas(el, {
    backgroundColor: '#000814',
    scale: 2,
    useCORS: true,
    allowTaint: true,
  });
  const a = document.createElement('a');
  a.download = 'trchinsou-title.png';
  a.href = canvas.toDataURL('image/png');
  a.click();
}

/* ═══════════════════════════════════════
   BOOT
═══════════════════════════════════════ */
init();
</script>
</body>
</html>
